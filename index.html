<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام توليد شهادات التقدير الاحترافي المتكامل</title>
    <style>
        :root {
            --maroon: #6b0012;
            --gold: #d4af37;
            --dark-gold: #aa7c11;
            --bg-ivory: #faf6ec;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: var(--maroon);
            margin: 10px 0 15px 0;
            font-size: 22px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
            width: 100%;
            align-items: center;
        }

        /* أزرار طي اللوحات المنفصلة */
        .toggle-panel-btn {
            background-color: var(--maroon);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background 0.3s;
            width: 100%;
            max-width: 850px;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .toggle-panel-btn.secondary {
            background-color: #333;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 850px;
            box-sizing: border-box;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out, opacity 0.3s ease-out;
            overflow: hidden;
        }

        .control-panel.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin: 0;
            opacity: 0;
            border: none;
            pointer-events: none;
        }

        .control-panel h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 8px;
            font-size: 18px;
            text-align: center;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        /* شبكة السلايدرز المتقدمة */
        .slider-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        @media (max-width: 750px) {
            .slider-section {
                grid-template-columns: 1fr;
            }
        }

        .slider-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-right: 4px solid #333;
        }

        .slider-group.text-control {
            border-right-color: var(--maroon);
        }

        .slider-group h4 {
            margin: 0 0 12px 0;
            color: #222;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .slider-row:last-child {
            margin-bottom: 0;
        }

        .slider-row label {
            font-size: 12px;
            font-weight: bold;
            color: #444;
            min-width: 140px;
        }

        .slider-row input[type="range"] {
            flex: 1;
            accent-color: var(--maroon);
        }

        .slider-row span {
            font-size: 11px;
            color: #555;
            min-width: 50px;
            text-align: left;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .form-group label {
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="file"],
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            width: 100%;
            max-width: 850px;
        }

        .btn {
            flex: 1;
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-print { background-color: var(--maroon); }
        .btn-image { background-color: #2e7d32; }

        .certificate-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .certificate-container {
            background-color: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            flex-shrink: 0;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            background-color: #fff;
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 0 !important;
            }
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                width: 297mm !important;
                height: 210mm !important;
                background: #fff !important;
                overflow: hidden !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .control-panel, h1, .certificate-scroll-wrapper, .toggle-panel-btn, .action-buttons {
                display: none !important;
            }
            .certificate-container {
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 297mm !important;
                height: 210mm !important;
            }
            canvas {
                width: 297mm !important;
                height: 210mm !important;
                max-width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <h1>نظام توليد شهادات التقدير الاحترافي</h1>

    <div class="container">
        
        <button class="toggle-panel-btn" onclick="togglePanel('dataPanel', 'arrowData')">
            <span>📝 لوحة إدخال البيانات والملفات الأساسية</span>
            <span id="arrowData">▲</span>
        </button>
        
        <div class="control-panel" id="dataPanel">
            <div class="form-grid">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nameInput">اسم الطالب / الطالبة:</label>
                        <input type="text" id="nameInput" value="محمد علي" oninput="drawCertificate()">
                    </div>
                    
                    <div class="form-group">
                        <label for="dateInput">تاريخ الشهادة:</label>
                        <input type="date" id="dateInput" onchange="drawCertificate()">
                    </div>
                </div>

                <div class="form-group">
                    <label for="schoolInput">اسم المدرسة / المؤسسة:</label>
                    <input type="text" id="schoolInput" value="مدرسة 15 مايو التجريبية" oninput="drawCertificate()">
                </div>

                <div class="form-group">
                    <label for="textInput">نص التقدير والثناء الداخلي:</label>
                    <textarea id="textInput" oninput="drawCertificate()">وذلك تقديراً لجهوده المتميزة وتفوقه في الدراسة وسلوكه الطيب ومثابرته طوال العام الدراسي. نتمنى لك دوام التوفيق والنجاح لانتهاء العام الدراسي.</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label style="color: #2e7d32;" for="bgInput">🖼️ اختر خلفية للشهادة (اختياري):</label>
                        <input type="file" id="bgInput" accept="image/*" onchange="loadCustomBackground(event)">
                    </div>
                    
                    <div class="form-group">
                        <label for="photoInput">👶 صورة الطالب (بخلفية بيضاء سادة):</label>
                        <input type="file" id="photoInput" accept="image/*" onchange="loadStudentPhoto(event)">
                    </div>
                </div>
            </div>
        </div>

        <button class="toggle-panel-btn secondary" onclick="togglePanel('sliderPanel', 'arrowSlider')">
            <span>📐 لوحة تحكم الأبعاد وهندسة التصميم والمواقع</span>
            <span id="arrowSlider">▲</span>
        </button>
        
        <div class="control-panel" id="sliderPanel">
            <div class="slider-section">
                
                <div class="slider-group">
                    <h4>👶 إعدادات موقع وحجم صورة الطالب</h4>
                    <div class="slider-row">
                        <label>موقع أفقي (X):</label>
                        <input type="range" id="photoXSlider" min="0" max="1000" value="10" oninput="updateSliders()">
                        <span id="photoXVal">10px</span>
                    </div>
                    <div class="slider-row">
                        <label>موقع رأسي (Y):</label>
                        <input type="range" id="photoYSlider" min="0" max="500" value="25" oninput="updateSliders()">
                        <span id="photoYVal">25px</span>
                    </div>
                    <div class="slider-row">
                        <label>عرض الصورة (W):</label>
                        <input type="range" id="photoWidthSlider" min="100" max="900" value="500" oninput="updateSliders()">
                        <span id="photoWidthVal">500px</span>
                    </div>
                    <div class="slider-row">
                        <label>ارتفاع الصورة (H):</label>
                        <input type="range" id="photoHeightSlider" min="100" max="850" value="690" oninput="updateSliders()">
                        <span id="photoHeightVal">690px</span>
                    </div>
                </div>

                <div class="slider-group text-control">
                    <h4>📝 إعدادات وتنسيق منطقة النصوص</h4>
                    <div class="slider-row">
                        <label>موقع النص الأفقي (X):</label>
                        <input type="range" id="textXSlider" min="100" max="1100" value="786" oninput="updateSliders()">
                        <span id="textXVal">786px</span>
                    </div>
                    <div class="slider-row">
                        <label>موقع نص الثناء (Y):</label>
                        <input type="range" id="textYSlider" min="200" max="650" value="460" oninput="updateSliders()">
                        <span id="textYVal">460px</span>
                    </div>
                    <div class="slider-row">
                        <label>عرض سطر النص الأقصى:</label>
                        <input type="range" id="textWidthSlider" min="200" max="900" value="450" oninput="updateSliders()">
                        <span id="textWidthVal">450px</span>
                    </div>
                    <div class="slider-row">
                        <label>حجم خط اسم الطالب:</label>
                        <input type="range" id="nameFontSizeSlider" min="24" max="70" value="42" oninput="updateSliders()">
                        <span id="nameFontSizeVal">42px</span>
                    </div>
                    <div class="slider-row">
                        <label>حجم خط نص الثناء:</label>
                        <input type="range" id="textFontSizeSlider" min="14" max="40" value="22" oninput="updateSliders()">
                        <span id="textFontSizeVal">22px</span>
                    </div>
                    <div class="slider-row">
                        <label>المسافة بين الأسطر:</label>
                        <input type="range" id="lineHeightSlider" min="25" max="70" value="40" oninput="updateSliders()">
                        <span id="lineHeightVal">40px</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-print" onclick="window.print()">🖨️ طباعة الشهادة على ورقة A4</button>
            <button class="btn btn-image" onclick="downloadCertificateImage()">💾 حفظ كصورة PNG أصلية</button>
        </div>

        <div class="certificate-scroll-wrapper">
            <div class="certificate-container">
                <canvas id="certCanvas" width="1123" height="794"></canvas> 
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');

        let customBgImage = null;
        let studentPhotoImg = null;

        window.onload = function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('dateInput').value = `${year}-${month}-${day}`;
            
            // التوزيع الافتراضي الموزون للبدء بشكل سليم
            document.getElementById('textXSlider').value = Math.round(canvas.width * 0.70);

            updateSliders();
        }

        // دالة موحدة ومرنة للتحكم في طي وفتح أي لوحة بالتبادل
        function togglePanel(panelId, arrowId) {
            const panel = document.getElementById(panelId);
            const arrow = document.getElementById(arrowId);
            panel.classList.toggle('collapsed');
            arrow.textContent = panel.classList.contains('collapsed') ? '▼' : '▲';
        }

        function updateSliders() {
            document.getElementById('photoXVal').textContent = document.getElementById('photoXSlider').value + 'px';
            document.getElementById('photoYVal').textContent = document.getElementById('photoYSlider').value + 'px';
            document.getElementById('photoWidthVal').textContent = document.getElementById('photoWidthSlider').value + 'px';
            document.getElementById('photoHeightVal').textContent = document.getElementById('photoHeightSlider').value + 'px';
            
            document.getElementById('textXVal').textContent = document.getElementById('textXSlider').value + 'px';
            document.getElementById('textYVal').textContent = document.getElementById('textYSlider').value + 'px';
            document.getElementById('textWidthVal').textContent = document.getElementById('textWidthSlider').value + 'px';
            document.getElementById('nameFontSizeVal').textContent = document.getElementById('nameFontSizeSlider').value + 'px';
            document.getElementById('textFontSizeVal').textContent = document.getElementById('textFontSizeSlider').value + 'px';
            document.getElementById('lineHeightVal').textContent = document.getElementById('lineHeightSlider').value + 'px';
            
            drawCertificate();
        }

        function loadCustomBackground(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    customBgImage = img;
                    drawCertificate();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function loadStudentPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = img.width;
                    tempCanvas.height = img.height;
                    tempCtx.drawImage(img, 0, 0);

                    const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                    const data = imgData.data;
                    const threshold = 220;

                    for (let i = 0; i < data.length; i += 4) {
                        if (data[i] > threshold && data[i+1] > threshold && data[i+2] > threshold) {
                            data[i+3] = 0;
                        }
                    }
                    tempCtx.putImageData(imgData, 0, 0);

                    const processedImg = new Image();
                    processedImg.onload = function() {
                        studentPhotoImg = processedImg;
                        drawCertificate();
                    };
                    processedImg.src = tempCanvas.toDataURL();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // دالة توزيع السطور الذكية والمعدلة لدعم تغيير المسافات بين السطور حياً
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const paragraphs = text.split('\n');
            let currentY = y;

            for (let i = 0; i < paragraphs.length; i++) {
                const words = paragraphs[i].split(' ');
                let line = '';

                for (let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    let metrics = context.measureText(testLine);
                    let testWidth = metrics.width;

                    if (testWidth > maxWidth && n > 0) {
                        context.fillText(line, x, currentY);
                        line = words[n] + ' ';
                        currentY += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                context.fillText(line, x, currentY);
                currentY += lineHeight;
            }
        }

        function drawCertificate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (customBgImage) {
                ctx.drawImage(customBgImage, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#faf6ec";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = "#6b0012";
                ctx.lineWidth = 30;
                ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);

                ctx.strokeStyle = "#d4af37";
                ctx.lineWidth = 4;
                ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);
                
                drawCornerDeco(45, 45, 50, 50); 
                drawCornerDeco(canvas.width - 45, 45, -50, 50); 
                drawCornerDeco(45, canvas.height - 45, 50, -50); 
                drawCornerDeco(canvas.width - 45, canvas.height - 45, -50, -50); 
            }

            ctx.textBaseline = "middle";
            ctx.textAlign = "center"; 

            const schoolName = document.getElementById('schoolInput').value || "";
            const studentName = document.getElementById('nameInput').value || "";
            const appreciationText = document.getElementById('textInput').value || "";
            
            const dateVal = document.getElementById('dateInput').value;
            let formattedDate = "";
            if(dateVal) {
                const d = new Date(dateVal);
                formattedDate = `${d.getFullYear()} / ${String(d.getMonth() + 1).padStart(2, '0')} / ${String(d.getDate()).padStart(2, '0')}`;
            }

            // التقاط كافة القيم من محاور السلايدرز حياً
            const textCenterX = parseInt(document.getElementById('textXSlider').value); 
            const textCenterY = parseInt(document.getElementById('textYSlider').value); 
            const maxTextWidth = parseInt(document.getElementById('textWidthSlider').value);
            const nameFontSize = parseInt(document.getElementById('nameFontSizeSlider').value);
            const textFontSize = parseInt(document.getElementById('textFontSizeSlider').value);
            const customLineHeight = parseInt(document.getElementById('lineHeightSlider').value);
            
            const photoOffsetX = parseInt(document.getElementById('photoXSlider').value);
            const photoOffsetY = parseInt(document.getElementById('photoYSlider').value);
            const photoWidth = parseInt(document.getElementById('photoWidthSlider').value);
            const photoHeight = parseInt(document.getElementById('photoHeightSlider').value);

            // 1. اسم المدرسة
            ctx.font = "bold 44px 'Cairo', 'Segoe UI', Arial";
            ctx.fillStyle = "#6b0012"; 
            ctx.fillText(schoolName, textCenterX + 50, 115);

            // 2. عنوان الشهادة
            ctx.font = "bold 56px 'Cairo', 'Segoe UI', Arial";
            ctx.fillStyle = "#6b0012";
            ctx.fillText("شهادة تقدير", textCenterX, 220);

            // 3. النص الفرعي
            ctx.font = "600 22px 'Cairo', 'Segoe UI', Arial";
            ctx.fillStyle = "#111111";
            ctx.fillText("تمنح هذه الشهادة للتلميذ / للتلميذة", textCenterX, 290);

            // 4. اسم الطالب (مرتبط بحجم الخط الديناميكي)
            ctx.font = `bold ${nameFontSize}px 'Cairo', 'Segoe UI', Arial`;
            ctx.fillStyle = "#6b0012";
            ctx.fillText(studentName, textCenterX, 370);

            ctx.beginPath();
            ctx.strokeStyle = "#6b0012";
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.moveTo(textCenterX - 180, 410);
            ctx.lineTo(textCenterX + 180, 410);
            ctx.stroke();
            ctx.setLineDash([]); 

            // 5. نص التقدير والثناء (مرتبط بالموقع والحجم والمسافات ديناميكياً)
            ctx.font = `600 ${textFontSize}px 'Cairo', 'Segoe UI', Arial`;
            ctx.fillStyle = "#222222";
            wrapText(ctx, appreciationText, textCenterX, textCenterY, maxTextWidth, customLineHeight);

            // 6. التوقيع والتاريخ
            ctx.font = "bold 18px 'Cairo', 'Segoe UI', Arial";
            ctx.fillStyle = "#111111";
            ctx.fillText("توقيع المدير / المديرة", textCenterX + 140, 660);
            ctx.beginPath();
            ctx.strokeStyle = "#444444";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.moveTo(textCenterX + 50, 700);
            ctx.lineTo(textCenterX + 230, 700);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillText(`التاريخ:  ${formattedDate}`, textCenterX - 140, 660);

            if (!customBgImage) {
                // بقيت شارة الذهب في مكانها متناسقة مع إزاحة النص المحسوبة
                drawGoldBadge(textCenterX - 20, 665);
            }

            // 7. رسم صورة الطالب بالتحكم المطلق والكامل في الإحداثيات والوصول للحواف
            if (studentPhotoImg) {
                const photoY = canvas.height - photoHeight - photoOffsetY; 
                ctx.drawImage(studentPhotoImg, photoOffsetX, photoY, photoWidth, photoHeight);
            }
        }

        function drawCornerDeco(x, y, w, h) {
            ctx.beginPath();
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 5;
            ctx.moveTo(x + w, y);
            ctx.lineTo(x, y);
            ctx.lineTo(x, y + h);
            ctx.stroke();
        }

        function drawGoldBadge(x, y) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fillStyle = "#d4af37";
            ctx.shadowColor = "rgba(0,0,0,0.15)";
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.setLineDash([3, 3]);
            ctx.stroke();
            ctx.restore();
        }

        function downloadCertificateImage() {
            const studentName = document.getElementById('nameInput').value.trim() || "طالب";
            const link = document.createElement('a');
            link.download = `شهادة_تقدير_${studentName}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>
</html>
